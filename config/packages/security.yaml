security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/auth/login$
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth,             roles: PUBLIC_ACCESS }
        - { path: ^/api/upload,           roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/students$,        roles: PUBLIC_ACCESS,   methods: [GET] }
        - { path: ^/api/students/\d+$,    roles: PUBLIC_ACCESS,   methods: [GET] }
        - { path: ^/api/offers$,          roles: PUBLIC_ACCESS,   methods: [GET] }
        - { path: ^/api/offers/\d+$,      roles: PUBLIC_ACCESS,   methods: [GET] }
        - { path: ^/api/students,         roles: ROLE_STUDENT,    methods: [POST, PUT, PATCH, DELETE] }
        - { path: ^/api/offers,           roles: ROLE_COMPANY,    methods: [POST, PUT, PATCH, DELETE] }
        - { path: ^/api/admin,            roles: ROLE_STAFF }
        - { path: ^/api,                  roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
